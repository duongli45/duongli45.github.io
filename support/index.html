<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support - Scroll Escaper</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --ink: #1a1814;
      --muted: #7a7570;
      --accent: #2c5f4a;
      --border: #e2ddd6;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      max-width: 480px;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 64px 40px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.05);
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--ink);
      margin-bottom: 24px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .contact-link {
      display: inline-block;
      margin-top: 16px;
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid currentColor;
      padding-bottom: 2px;
      transition: opacity 0.2s;
    }

    .contact-link:hover {
      opacity: 0.7;
    }

    .footer-note {
      margin-top: 40px;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="card">
    <p>This application was developed by</p>
    <h1>Li Nguyen</h1>
    
    <p>Need help or have any questions? Please contact:</p>
    <a href="mailto:li.nguyenduong@gmail.com" class="contact-link">li.nguyenduong@gmail.com</a>

  </div>
</body>
</html>
